<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOAT TEAM — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --border2: #333;
    --yellow: #d8d15a;
    --red: #e05555;
    --green: #5cb85c;
    --muted: #666;
    --text: #e8e8e8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center; z-index: 9999;
  }
  .login-box {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 40px; width: 320px; text-align: center;
  }
  .login-box h1 { font-family: 'Bebas Neue'; font-size: 32px; color: var(--yellow); letter-spacing: .1em; margin-bottom: 6px; }
  .login-box p { color: var(--muted); font-size: 12px; margin-bottom: 28px; }
  .login-box input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 12px 16px; color: var(--text); font-family: 'DM Mono';
    font-size: 14px; margin-bottom: 12px; letter-spacing: .1em;
  }
  .login-box input:focus { outline: none; border-color: var(--yellow); }
  .btn-primary {
    width: 100%; background: var(--yellow); color: #000; border: none;
    border-radius: 8px; padding: 12px; font-family: 'Bebas Neue'; font-size: 18px;
    letter-spacing: .1em; cursor: pointer; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .login-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  /* LAYOUT */
  #app { display: none; }
  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; gap: 16px; height: 56px;
  }
  header h1 { font-family: 'Bebas Neue'; font-size: 24px; color: var(--yellow); letter-spacing: .1em; }
  header span { color: var(--muted); font-size: 11px; font-family: 'DM Mono'; }
  .header-spacer { flex: 1; }
  .btn-logout {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  .main { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 56px); }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-header h2 { font-size: 11px; font-family: 'DM Mono'; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }
  .btn-new {
    width: 100%; background: var(--yellow); color: #000; border: none;
    border-radius: 8px; padding: 10px; font-family: 'Bebas Neue'; font-size: 16px;
    letter-spacing: .08em; cursor: pointer; transition: opacity .2s;
  }
  .btn-new:hover { opacity: .85; }
  .archer-list { flex: 1; overflow-y: auto; padding: 8px; }
  .archer-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 12px;
    border-radius: 8px; cursor: pointer; transition: background .15s; margin-bottom: 2px;
  }
  .archer-item:hover { background: var(--surface2); }
  .archer-item.active { background: var(--surface2); border-left: 2px solid var(--yellow); }
  .archer-avatar {
    width: 36px; height: 36px; border-radius: 50%; overflow: hidden;
    background: var(--surface2); border: 1px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; font-size: 13px; flex-shrink: 0;
  }
  .archer-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .archer-info { flex: 1; min-width: 0; }
  .archer-info .aname { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .archer-info .arole { font-size: 10px; color: var(--muted); }
  .rarity-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* EDITOR */
  .editor { overflow-y: auto; padding: 24px; background: var(--bg); }
  .editor-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; color: var(--muted); gap: 8px;
  }
  .editor-empty .icon { font-size: 48px; opacity: .3; }
  .editor-empty p { font-size: 13px; }

  .editor-form { max-width: 720px; }
  .form-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 28px;
    padding-bottom: 20px; border-bottom: 1px solid var(--border);
  }
  .form-header h2 { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: .05em; flex: 1; }
  .btn-delete {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    border-radius: 8px; padding: 8px 14px; font-size: 12px; cursor: pointer;
  }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }
  .btn-save {
    background: var(--yellow); color: #000; border: none;
    border-radius: 8px; padding: 8px 20px; font-family: 'Bebas Neue'; font-size: 16px;
    letter-spacing: .06em; cursor: pointer;
  }
  .btn-save:hover { opacity: .85; }

  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 10px; font-family: 'DM Mono'; color: var(--muted);
    text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }

  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: var(--muted); font-family: 'DM Mono'; }
  .field input, .field select, .field textarea {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Sans'; font-size: 13px; transition: border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--yellow);
  }
  .field textarea { resize: vertical; min-height: 80px; }
  .field select option { background: var(--surface2); }

  /* STAT FIELD */
  .stat-field { display: flex; flex-direction: column; gap: 5px; }
  .stat-field label { font-size: 11px; color: var(--muted); font-family: 'DM Mono'; }
  .stat-row { display: flex; align-items: center; gap: 8px; }
  .stat-row input[type=range] { flex: 1; accent-color: var(--yellow); }
  .stat-val {
    width: 36px; text-align: center; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 6px;
    padding: 4px; font-family: 'DM Mono'; font-size: 13px; color: var(--yellow);
  }

  /* FOTO PREVIEW */
  .foto-section { display: flex; flex-direction: column; gap: 16px; }
  .foto-row { display: grid; grid-template-columns: 80px 1fr; gap: 16px; align-items: start; }
  .foto-preview {
    width: 80px; height: 80px; border-radius: 50%; overflow: hidden;
    background: var(--surface2); border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue'; font-size: 20px; color: var(--muted); flex-shrink:0;
  }
  .foto-preview img { width: 100%; height: 100%; object-fit: cover; }
  .foto-controls { display: flex; flex-direction: column; gap: 10px; }

  /* BANNER EDITOR */
  .banner-editor-wrap { display: flex; flex-direction: column; gap: 8px; }
  .banner-editor-label { font-size: 11px; font-family: 'DM Mono'; color: var(--muted); }
  .banner-editor {
    position: relative; width: 100%; height: 180px; border-radius: 12px;
    overflow: hidden; background: var(--surface2); border: 1px solid var(--border2);
    cursor: grab; user-select: none;
  }
  .banner-editor:active { cursor: grabbing; }
  .banner-editor-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; pointer-events: none;
  }
  .banner-editor-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
  }
  .banner-editor-hint {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 6px 12px; font-size: 11px; color: rgba(255,255,255,0.7);
    pointer-events: none; transition: opacity .3s;
  }
  .banner-editor-crosshair {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 20px; height: 20px; pointer-events: none;
  }
  .banner-editor-crosshair::before, .banner-editor-crosshair::after {
    content: ''; position: absolute; background: rgba(255,255,255,0.6);
  }
  .banner-editor-crosshair::before { width: 1px; height: 100%; left: 50%; top: 0; }
  .banner-editor-crosshair::after { height: 1px; width: 100%; top: 50%; left: 0; }
  .banner-pos-display { font-size: 11px; font-family: 'DM Mono'; color: var(--muted); text-align: right; }

  /* LOGROS */
  .logros-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
  .logro-item {
    display: grid; grid-template-columns: 80px 1fr 140px 32px; gap: 8px; align-items: center;
  }
  .logro-item input {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 6px; padding: 8px 10px; color: var(--text);
    font-family: 'DM Sans'; font-size: 12px;
  }
  .logro-item input:focus { outline: none; border-color: var(--yellow); }
  .btn-remove-logro {
    width: 32px; height: 32px; background: none; border: 1px solid var(--border2);
    border-radius: 6px; color: var(--muted); cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-remove-logro:hover { border-color: var(--red); color: var(--red); }
  .btn-add-logro {
    background: none; border: 1px dashed var(--border2); color: var(--muted);
    border-radius: 8px; padding: 8px; font-size: 12px; cursor: pointer; width: 100%;
  }
  .btn-add-logro:hover { border-color: var(--yellow); color: var(--yellow); }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px; background: var(--surface);
    border: 1px solid var(--border2); border-radius: 10px; padding: 12px 20px;
    font-size: 13px; z-index: 9999; transform: translateY(80px); opacity: 0;
    transition: all .3s; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* COLOR PICKER */
  .color-row { display: flex; align-items: center; gap: 8px; }
  .color-row input[type=color] { width: 36px; height: 36px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
  .color-row input[type=text] {
    flex: 1; background: var(--surface); border: 1px solid var(--border2);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'DM Mono'; font-size: 13px;
  }
  .color-row input[type=text]:focus { outline: none; border-color: var(--yellow); }

  /* NAV TABS */
  .nav-tabs { display: flex; gap: 4px; padding: 0 24px; margin-right: auto; }
  .nav-tab {
    background: none; border: none; color: var(--muted); font-family: 'DM Sans';
    font-size: 13px; font-weight: 500; padding: 0 12px; height: 56px;
    cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: var(--yellow); border-bottom-color: var(--yellow); }

  /* CODIGOS PANEL */
  .codigos-panel { padding: 24px; overflow-y: auto; background: var(--bg); }
  .codigos-top { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
  .codigos-top h2 { font-family: 'Bebas Neue'; font-size: 28px; letter-spacing: .05em; }
  .codigos-top .spacer { flex: 1; }
  .gen-form { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 12px 16px; }
  .gen-form select, .gen-form input {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
    padding: 8px 12px; color: var(--text); font-family: 'DM Sans'; font-size: 13px;
  }
  .gen-form select:focus, .gen-form input:focus { outline: none; border-color: var(--yellow); }
  .btn-gen {
    background: var(--yellow); color: #000; border: none; border-radius: 8px;
    padding: 8px 18px; font-family: 'Bebas Neue'; font-size: 16px; letter-spacing: .06em; cursor: pointer;
  }
  .btn-gen:hover { opacity: .85; }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px; }
  .stat-card .stat-num { font-family: 'Bebas Neue'; font-size: 32px; color: var(--yellow); line-height: 1; }
  .stat-card .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: 'DM Mono'; }

  /* FILTER BAR */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; align-items: center; }
  .filter-btn {
    background: var(--surface); border: 1px solid var(--border2); color: var(--muted);
    border-radius: 6px; padding: 6px 14px; font-size: 12px; cursor: pointer;
  }
  .filter-btn.active { border-color: var(--yellow); color: var(--yellow); }
  .search-input {
    background: var(--surface); border: 1px solid var(--border2); border-radius: 8px;
    padding: 7px 14px; color: var(--text); font-family: 'DM Mono'; font-size: 12px; width: 220px;
  }
  .search-input:focus { outline: none; border-color: var(--yellow); }

  /* CODIGOS TABLE */
  .codigos-table { width: 100%; border-collapse: collapse; }
  .codigos-table th {
    text-align: left; font-size: 10px; font-family: 'DM Mono'; color: var(--muted);
    text-transform: uppercase; letter-spacing: .1em; padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }
  .codigos-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; vertical-align: middle; }
  .codigos-table tr:hover td { background: var(--surface); }
  .codigo-text { font-family: 'DM Mono'; font-size: 13px; letter-spacing: .08em; color: var(--yellow); }
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
    font-weight: 700; letter-spacing: .08em; text-transform: uppercase;
  }
  .badge-canjeado { background: #5cb85c22; color: #5cb85c; }
  .badge-libre { background: #d8d15a22; color: #d8d15a; }
  .badge-inactivo { background: #66666622; color: #666; }
  .btn-icon {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
  }
  .btn-icon:hover { border-color: var(--red); color: var(--red); }
  .btn-copy {
    background: none; border: 1px solid var(--border2); color: var(--muted);
    border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
  }
  .btn-copy:hover { border-color: var(--yellow); color: var(--yellow); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h1>🐐 GOAT</h1>
    <p>Panel de administración</p>
    <input type="password" id="pwd-input" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-primary" onclick="doLogin()">ENTRAR</button>
    <div class="login-error" id="login-error">Contraseña incorrecta</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <h1>🐐 GOAT TEAM</h1>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('arqueros')">Arqueros</button>
      <button class="nav-tab" onclick="switchTab('codigos')">Códigos</button>
    </div>
    <div class="header-spacer"></div>
    <button class="btn-logout" onclick="doLogout()">Cerrar sesión</button>
  </header>

  <!-- ARQUEROS TAB -->
  <div id="tab-arqueros" class="main">
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Arqueros</h2>
        <button class="btn-new" onclick="newArcher()">+ NUEVO ARQUERO</button>
      </div>
      <div class="archer-list" id="archer-list"></div>
    </div>
    <div class="editor" id="editor">
      <div class="editor-empty">
        <div class="icon">🏹</div>
        <p>Selecciona un arquero para editar</p>
      </div>
    </div>
  </div>

  <!-- CODIGOS TAB -->
  <div id="tab-codigos" style="display:none; height:calc(100vh - 56px); overflow-y:auto;">
    <div class="codigos-panel">
      <div class="codigos-top">
        <h2>🎟 CÓDIGOS</h2>
        <div class="spacer"></div>
        <div class="gen-form">
          <select id="gen-archer">
            <option value="">Selecciona arquero...</option>
          </select>
          <input type="number" id="gen-cantidad" value="1" min="1" max="100" style="width:70px" placeholder="Cant.">
          <button class="btn-gen" onclick="generarCodigos()">GENERAR</button>
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-card"><div class="stat-num" id="stat-total">—</div><div class="stat-lbl">Total códigos</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-libres">—</div><div class="stat-lbl">Disponibles</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-canjeados">—</div><div class="stat-lbl">Canjeados</div></div>
        <div class="stat-card"><div class="stat-num" id="stat-inactivos">—</div><div class="stat-lbl">Inactivos</div></div>
      </div>

      <div class="filter-bar">
        <button class="filter-btn active" onclick="filterCodigos('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filterCodigos('libre', this)">Disponibles</button>
        <button class="filter-btn" onclick="filterCodigos('canjeado', this)">Canjeados</button>
        <button class="filter-btn" onclick="filterCodigos('inactivo', this)">Inactivos</button>
        <input class="search-input" id="search-codigos" placeholder="Buscar código..." oninput="searchCodigos()">
      </div>

      <table class="codigos-table">
        <thead>
          <tr>
            <th>Código</th>
            <th>Arquero</th>
            <th>Estado</th>
            <th>Creado</th>
            <th>Canjeado por</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="codigos-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://axaiyaflubssaghvhefe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF4YWl5YWZsdWJzc2FnaHZoZWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MjMwMzIsImV4cCI6MjA5MDQ5OTAzMn0.ur72JmEuh0KXp8Q9Eo7jF13kevxKaaDSZygR9wC3x6A';
const ADMIN_PASSWORD = 'goat2024';

const RARITY_COLORS = { legend:'#d8d15a', epic:'#a06cd5', rare:'#5b9bd5', common:'#888' };
const SPEC_OPTIONS = ['indoor','outdoor','field','3d'];

let archers = [];
let currentId = null;
let isNew = false;

// AUTH
function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadArchers();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pwd-input').value = '';
}

// SUPABASE
async function sbFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': method === 'POST' ? 'return=representation' : ''
    }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, opts);
  if (!res.ok) throw new Error(await res.text());
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

async function loadArchers() {
  try {
    archers = await sbFetch('archers?order=name');
    renderList();
  } catch(e) { showToast('Error cargando arqueros', 'error'); }
}

// LIST
function renderList() {
  const list = document.getElementById('archer-list');
  list.innerHTML = archers.map(a => {
    const color = RARITY_COLORS[a.rarity] || '#888';
    const fotoSrc = a.foto ? `https://axaiyaflubssaghvhefe.supabase.co/storage/v1/object/public/arqueros/${a.foto}.webp` : null;
    return `<div class="archer-item ${currentId===a.id?'active':''}" onclick="selectArcher('${a.id}')">
      <div class="archer-avatar" style="border-color:${color}33;color:${color}">
        ${fotoSrc ? `<img src="${fotoSrc}" onerror="this.style.display='none'">` : a.avatar||'?'}
      </div>
      <div class="archer-info">
        <div class="aname">${a.name}</div>
        <div class="arole">${a.role||''}</div>
      </div>
      <div class="rarity-dot" style="background:${color}"></div>
    </div>`;
  }).join('');
}

function selectArcher(id) {
  currentId = id;
  isNew = false;
  const archer = archers.find(a => a.id === id);
  renderEditor(archer);
  renderList();
  setTimeout(() => initBannerDrag(), 50);
}

function newArcher() {
  currentId = null;
  isNew = true;
  renderEditor({
    id: 'A-' + String(archers.length + 1).padStart(3,'0'),
    name: '', rarity: 'common', role: '', quote: '',
    t: 50, c: 50, e: 50, i: 50,
    avatar: '', color: '#888888', foto: '',
    ability: '', ability_desc: '', spec: 'outdoor', bio: '', top: []
  });
}

function logroRow(l, i) {
  return `<div class="logro-item" id="logro-${i}">

    <button class="btn-remove-logro" onclick="removeLogro(${i})">✕</button>
  </div>`;
}

function addLogro() {
  const list = document.getElementById('logros-list');
  const i = list.children.length;
  const div = document.createElement('div');
  div.innerHTML = logroRow({}, i);
  list.appendChild(div.firstChild);
}

function removeLogro(i) {
  document.getElementById(`logro-${i}`)?.remove();
}

const STORAGE_URL = 'https://axaiyaflubssaghvhefe.supabase.co/storage/v1';

async function uploadFoto() {
  const file = document.getElementById('f-foto-file').files[0];
  if (!file) return;

  const status = document.getElementById('upload-status');
  status.textContent = '⏳ Subiendo...';
  status.style.color = 'var(--muted)';

  // Generate filename from archer name or use file name
  const nombreInput = document.getElementById('f-name').value.trim();
  const baseName = nombreInput
    ? 'Arquero-' + nombreInput.replace(/\s+/g, '-')
    : file.name.replace(/\.[^.]+$/, '');

  try {
    // Convert to webp-like upload (keep original format, rename)
    const ext = file.name.split('.').pop();
    const fileName = `${baseName}.${ext}`;

    const res = await fetch(`${STORAGE_URL}/object/arqueros/${fileName}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': file.type,
        'x-upsert': 'true'
      },
      body: file
    });

    if (!res.ok) throw new Error(await res.text());

    // Update foto field with filename without extension
    const fotoName = fileName.replace(/\.[^.]+$/, '');
    document.getElementById('f-foto').value = fotoName;
    status.textContent = '✅ Subida';
    status.style.color = 'var(--green)';
    previewFoto();
  } catch(e) {
    status.textContent = '❌ Error';
    status.style.color = 'var(--red)';
    showToast('Error subiendo foto: ' + e.message, 'error');
  }
}

function getStorageFotoUrl(foto, ext='webp') {
  if (!foto) return null;
  // Try webp first, fallback handled by onerror
  return `${STORAGE_URL}/object/public/arqueros/${foto}.${ext}`;
}

function previewFoto() {
  const foto = document.getElementById('f-foto').value;
  const preview = document.getElementById('foto-preview');
  const bannerEditor = document.getElementById('banner-editor');
  const url = getStorageFotoUrl(foto);
  if (foto && url) {
    preview.innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.src='${getStorageFotoUrl(foto,'png')}';this.onerror=()=>this.parentElement.innerHTML='❌'">`;
    if (bannerEditor) {
      const pos = document.getElementById('f-foto-position')?.value || 'center center';
      bannerEditor.innerHTML = `
        <img class="banner-editor-img" id="banner-img" src="${url}" style="object-position:${pos}" onerror="this.src='${getStorageFotoUrl(foto,'png')}'">
        <div class="banner-editor-overlay"></div>
        <div class="banner-editor-hint" id="banner-hint">✋ Arrastra para ajustar</div>
        <div class="banner-editor-crosshair"></div>`;
      initBannerDrag();
    }
  } else {
    preview.innerHTML = document.getElementById('f-avatar')?.value || '?';
    if (bannerEditor) bannerEditor.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:12px">Sin foto</div>';
  }
}

function initBannerDrag() {
  const editor = document.getElementById('banner-editor');
  const img = document.getElementById('banner-img');
  const hint = document.getElementById('banner-hint');
  const posDisplay = document.getElementById('banner-pos-display');
  const posInput = document.getElementById('f-foto-position');
  if (!editor || !img) return;

  let dragging = false;
  let startX, startY, startPosX, startPosY;

  // Parse current position
  const currentPos = posInput?.value || 'center center';
  let posX = 50, posY = 50;
  const match = currentPos.match(/([\d.]+)%\s+([\d.]+)%/);
  if (match) { posX = parseFloat(match[1]); posY = parseFloat(match[2]); }

  function updatePos() {
    const posStr = `${posX.toFixed(1)}% ${posY.toFixed(1)}%`;
    img.style.objectPosition = posStr;
    if (posDisplay) posDisplay.textContent = posStr;
    if (posInput) posInput.value = posStr;
  }

  editor.addEventListener('mousedown', e => {
    dragging = true;
    startX = e.clientX; startY = e.clientY;
    startPosX = posX; startPosY = posY;
    if (hint) hint.style.opacity = '0';
    e.preventDefault();
  });

  // Touch support
  editor.addEventListener('touchstart', e => {
    dragging = true;
    startX = e.touches[0].clientX; startY = e.touches[0].clientY;
    startPosX = posX; startPosY = posY;
    if (hint) hint.style.opacity = '0';
  }, {passive: true});

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const rect = editor.getBoundingClientRect();
    const dx = (e.clientX - startX) / rect.width * 100;
    const dy = (e.clientY - startY) / rect.height * 100;
    posX = Math.max(0, Math.min(100, startPosX - dx));
    posY = Math.max(0, Math.min(100, startPosY - dy));
    updatePos();
  });

  document.addEventListener('touchmove', e => {
    if (!dragging) return;
    const rect = editor.getBoundingClientRect();
    const dx = (e.touches[0].clientX - startX) / rect.width * 100;
    const dy = (e.touches[0].clientY - startY) / rect.height * 100;
    posX = Math.max(0, Math.min(100, startPosX - dx));
    posY = Math.max(0, Math.min(100, startPosY - dy));
    updatePos();
  }, {passive: true});

  document.addEventListener('mouseup', () => { dragging = false; });
  document.addEventListener('touchend', () => { dragging = false; });

  updatePos();
}

// Init drag on load if foto exists
setTimeout(() => { if (document.getElementById('banner-img')) initBannerDrag(); }, 100);

function syncColor(from) {
  if (from === 'picker') {
    document.getElementById('f-color').value = document.getElementById('f-color-picker').value;
  } else {
    const val = document.getElementById('f-color').value;
    if (/^#[0-9a-fA-F]{6}$/.test(val)) document.getElementById('f-color-picker').value = val;
  }
}

function updateRarityColor() {
  const rarity = document.getElementById('f-rarity').value;
  const color = RARITY_COLORS[rarity] || '#888';
  document.getElementById('f-color').value = color;
  document.getElementById('f-color-picker').value = color;
}

function getLogrosList() {
  const list = document.getElementById('logros-list');
  const logros = [];
  for (const item of list.children) {
    const i = item.id.split('-')[1];
    const pos = document.getElementById(`lpos-${i}`)?.value?.trim();
    const event = document.getElementById(`levent-${i}`)?.value?.trim();
    const year = document.getElementById(`lyear-${i}`)?.value?.trim();
    if (event) logros.push({ pos: pos||'', event, year: year||'' });
  }
  return logros;
}

async function saveArcher() {
  const data = {
    id: document.getElementById('f-id').value.trim(),
    name: document.getElementById('f-name').value.trim(),
    rarity: document.getElementById('f-rarity').value,
    role: document.getElementById('f-role').value.trim(),
    quote: document.getElementById('f-quote').value.trim(),
    t: parseInt(document.getElementById('f-t').value),
    c: parseInt(document.getElementById('f-c').value),
    e: parseInt(document.getElementById('f-e').value),
    i: parseInt(document.getElementById('f-i').value),
    avatar: document.getElementById('f-avatar').value.trim(),
    color: document.getElementById('f-color').value.trim(),
    foto: document.getElementById('f-foto').value.trim(),
    ability: document.getElementById('f-ability').value.trim(),
    ability_desc: document.getElementById('f-ability-desc').value.trim(),
    spec: document.getElementById('f-spec').value,
    bio: document.getElementById('f-bio').value.trim(),
    foto_position: document.getElementById('f-foto-position')?.value || 'center center',
    top: getLogrosList()
  };

  if (!data.name) { showToast('El nombre es requerido', 'error'); return; }

  try {
    if (isNew) {
      await sbFetch('archers', 'POST', data);
      showToast('✅ Arquero creado', 'success');
    } else {
      await sbFetch(`archers?id=eq.${data.id}`, 'PATCH', data);
      showToast('✅ Guardado', 'success');
    }
    currentId = data.id;
    isNew = false;
    await loadArchers();
    renderList();
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
  }
}

async function deleteArcher(id) {
  if (!confirm(`¿Eliminar este arquero?`)) return;
  try {
    await sbFetch(`archers?id=eq.${id}`, 'DELETE');
    currentId = null;
    document.getElementById('editor').innerHTML = `<div class="editor-empty"><div class="icon">🏹</div><p>Selecciona un arquero para editar</p></div>`;
    showToast('🗑 Arquero eliminado', 'success');
    await loadArchers();
  } catch(e) { showToast('Error eliminando', 'error'); }
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

// ── TABS ──
function switchTab(tab) {
  document.getElementById('tab-arqueros').style.display = tab === 'arqueros' ? 'grid' : 'none';
  document.getElementById('tab-codigos').style.display = tab === 'codigos' ? 'block' : 'none';
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'codigos') loadCodigos();
}

// ── CODIGOS ──
let allCodigos = [];
let currentFilter = 'todos';

function genCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for (let i = 0; i < 12; i++) {
    if (i > 0 && i % 4 === 0) code += '-';
    code += chars[Math.floor(Math.random() * chars.length)];
  }
  return code;
}

async function loadCodigos() {
  try {
    // Populate archer selector
    const sel = document.getElementById('gen-archer');
    sel.innerHTML = '<option value="">Selecciona arquero...</option>' +
      archers.map(a => `<option value="${a.id}">${a.name}</option>`).join('');

    allCodigos = await sbFetch('codigos?order=created_at.desc');
    renderCodigos(allCodigos);
    updateStats(allCodigos);
  } catch(e) { showToast('Error cargando códigos', 'error'); }
}

function updateStats(data) {
  const total = data.length;
  const canjeados = data.filter(c => c.canjeado).length;
  const inactivos = data.filter(c => !c.activo).length;
  const libres = data.filter(c => !c.canjeado && c.activo).length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-libres').textContent = libres;
  document.getElementById('stat-canjeados').textContent = canjeados;
  document.getElementById('stat-inactivos').textContent = inactivos;
}

function renderCodigos(data) {
  const tbody = document.getElementById('codigos-tbody');
  if (!data.length) {
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">No hay códigos</td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(c => {
    const archer = archers.find(a => a.id === c.carta_id);
    const nombre = archer ? archer.name : c.carta_id;
    const color = archer ? (RARITY_COLORS[archer.rarity] || '#888') : '#888';
    const fecha = c.created_at ? new Date(c.created_at).toLocaleDateString('es-MX') : '—';

    let badge = '';
    if (!c.activo) badge = `<span class="badge badge-inactivo">Inactivo</span>`;
    else if (c.canjeado) badge = `<span class="badge badge-canjeado">✓ Canjeado</span>`;
    else badge = `<span class="badge badge-libre">Disponible</span>`;

    return `<tr>
      <td><span class="codigo-text">${c.codigo}</span></td>
      <td><span style="color:${color};font-weight:600">${nombre}</span></td>
      <td>${badge}</td>
      <td style="color:var(--muted);font-size:12px">${fecha}</td>
      <td style="color:var(--muted);font-size:11px;font-family:'DM Mono'">${c.canjeado_por ? c.canjeado_por.substring(0,8)+'...' : '—'}</td>
      <td style="display:flex;gap:6px">
        <button class="btn-copy" onclick="copyCode('${c.codigo}')" title="Copiar">📋</button>
        ${c.activo && !c.canjeado ? `<button class="btn-icon" onclick="toggleCodigo('${c.codigo}', false)" title="Desactivar">🚫</button>` : ''}
        ${!c.activo ? `<button class="btn-copy" onclick="toggleCodigo('${c.codigo}', true)" title="Activar">✅</button>` : ''}
      </td>
    </tr>`;
  }).join('');
}

function filterCodigos(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function searchCodigos() { applyFilters(); }

function applyFilters() {
  const search = document.getElementById('search-codigos').value.toLowerCase();
  let filtered = allCodigos;
  if (currentFilter === 'libre') filtered = filtered.filter(c => !c.canjeado && c.activo);
  else if (currentFilter === 'canjeado') filtered = filtered.filter(c => c.canjeado);
  else if (currentFilter === 'inactivo') filtered = filtered.filter(c => !c.activo);
  if (search) filtered = filtered.filter(c => c.codigo.toLowerCase().includes(search) || c.carta_id?.toLowerCase().includes(search));
  renderCodigos(filtered);
}

async function generarCodigos() {
  const archerId = document.getElementById('gen-archer').value;
  const cantidad = parseInt(document.getElementById('gen-cantidad').value) || 1;
  if (!archerId) { showToast('Selecciona un arquero', 'error'); return; }

  const nuevos = [];
  for (let i = 0; i < cantidad; i++) {
    nuevos.push({ codigo: genCode(), carta_id: archerId, canjeado: false, activo: true });
  }

  try {
    await sbFetch('codigos', 'POST', nuevos);
    showToast(`✅ ${cantidad} código${cantidad>1?'s':''} generado${cantidad>1?'s':''}`, 'success');
    await loadCodigos();
  } catch(e) { showToast('Error generando códigos', 'error'); }
}

async function toggleCodigo(codigo, activo) {
  try {
    await sbFetch(`codigos?codigo=eq.${codigo}`, 'PATCH', { activo });
    showToast(activo ? '✅ Código activado' : '🚫 Código desactivado', 'success');
    await loadCodigos();
  } catch(e) { showToast('Error', 'error'); }
}

function copyCode(codigo) {
  navigator.clipboard.writeText(codigo);
  showToast('📋 Código copiado', 'success');
}
